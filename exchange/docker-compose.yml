# Exchange Services - Environment-based Configuration
# Usage: docker compose up --build
#
# This stack is self-contained: it starts a PostgreSQL database so the
# services can be tested end-to-end with a single `docker compose up --build`.
#
# Note: Audit Service is optional and can be deployed separately.
#       See audit-service/docker-compose.yml for standalone deployment.
#       The orchestration-engine reads its audit configuration from
#       config.json and functions normally without the audit-service.

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres-${ENVIRONMENT:-local}
    environment:
      - POSTGRES_USER=${DB_USER:-exchange}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-exchange}
      # Default database; the additional per-service databases are created
      # by init-db.sql on first startup.
      - POSTGRES_DB=${DB_USER:-exchange}
    ports:
      - "${PORT_DB:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-exchange}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - opendif-network

  policy-decision-point:
    build:
      context: ./policy-decision-point
      dockerfile: Dockerfile
      args:
        BUILD_VERSION: ${BUILD_VERSION:-dev}
        BUILD_TIME: ${BUILD_TIME:-2025-09-09T16:30:00Z}
        GIT_COMMIT: ${GIT_COMMIT:-local}
    container_name: pdp-${ENVIRONMENT:-local}
    ports:
      - "${PORT_PDP:-8082}:8082"
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-local}
      - PORT=8082
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FORMAT=${LOG_FORMAT:-text}
      - SERVICE_NAME=policy-decision-point
      - OTEL_METRICS_EXPORTER=${OTEL_METRICS_EXPORTER:-prometheus}
      # Database configuration
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USERNAME=${DB_USER:-exchange}
      - DB_PASSWORD=${DB_PASSWORD:-exchange}
      - DB_NAME=${DB_NAME_PDP:-pdp}
      - DB_SSLMODE=${DB_SSLMODE:-disable}
      - RUN_MIGRATION=${RUN_MIGRATION:-true}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - opendif-network

  consent-engine:
    build:
      context: ./consent-engine
      dockerfile: Dockerfile
      args:
        BUILD_VERSION: ${BUILD_VERSION:-dev}
        BUILD_TIME: ${BUILD_TIME:-2025-09-09T16:30:00Z}
        GIT_COMMIT: ${GIT_COMMIT:-local}
    container_name: ce-${ENVIRONMENT:-local}
    ports:
      - "${PORT_CE:-8081}:8081"
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-local}
      - PORT=8081
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FORMAT=${LOG_FORMAT:-text}
      - CONSENT_PORTAL_URL=${CONSENT_PORTAL_URL:-http://localhost:5173}
      # IDP configuration (JWT verification for portal endpoints)
      - IDP_ISSUER=${IDP_ISSUER:-}
      - IDP_AUDIENCE=${IDP_AUDIENCE:-}
      - IDP_CLIENT_ID=${IDP_CLIENT_ID:-}
      - IDP_JWKS_URL=${IDP_JWKS_URL:-}
      - IDP_JWKS_INSECURE_SKIP_VERIFY=${IDP_JWKS_INSECURE_SKIP_VERIFY:-false}
      # Database configuration
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USERNAME=${DB_USER:-exchange}
      - DB_PASSWORD=${DB_PASSWORD:-exchange}
      - DB_NAME=${DB_NAME_CE:-consent_engine}
      - DB_SSLMODE=${DB_SSLMODE:-disable}
      - RUN_MIGRATION=${RUN_MIGRATION:-true}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - opendif-network

  orchestration-engine:
    build:
      context: ./orchestration-engine
      dockerfile: Dockerfile
      args:
        BUILD_VERSION: ${BUILD_VERSION:-dev}
        BUILD_TIME: ${BUILD_TIME:-2025-09-09T16:30:00Z}
        GIT_COMMIT: ${GIT_COMMIT:-local}
    container_name: oe-${ENVIRONMENT:-local}
    ports:
      - "${PORT_OE:-4000}:4000"
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-local}
      - PORT=4000
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FORMAT=${LOG_FORMAT:-text}
      - SERVICE_NAME=orchestration-engine
      - OTEL_METRICS_EXPORTER=${OTEL_METRICS_EXPORTER:-prometheus}
      # Database configuration (orchestration-engine uses DB_USER)
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-exchange}
      - DB_PASSWORD=${DB_PASSWORD:-exchange}
      - DB_NAME=${DB_NAME_OE:-orchestration_engine}
      - DB_SSLMODE=${DB_SSLMODE:-disable}
    volumes:
      - ./orchestration-engine/config.docker.json:/app/config.json:ro
    extra_hosts:
      # Lets the container reach mock providers running on the host
      # (resolves host.docker.internal on Linux too).
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - opendif-network

volumes:
  postgres-data:

networks:
  opendif-network:
    name: opendif-network
