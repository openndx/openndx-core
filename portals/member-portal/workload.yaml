apiVersion: openchoreo.dev/v1alpha1

metadata:
  name: ndx-member-portal

endpoints:
  - name: web
    port: 80
    type: HTTP
    visibility:
      - external

connections:
  - component: ndx-portal-backend
    endpoint: api
    visibility: project
    envBindings:
      address: NDX_PORTAL_BACKEND_URL

configurations:
  env:
    - name: VITE_API_URL
      value: ""
    - name: VITE_LOGS_URL
      value: ""
    - name: VITE_CLIENT_ID
      value: NDX_MEMBER_PORTAL
    - name: VITE_BASE_URL
      value: http://thunder-service.thunder.svc.cluster.local:8090
    - name: VITE_SCOPE
      value: "openid profile email groups"
    - name: VITE_SIGN_IN_REDIRECT_URL
      value: ""
    - name: VITE_SIGN_OUT_REDIRECT_URL
      value: ""
